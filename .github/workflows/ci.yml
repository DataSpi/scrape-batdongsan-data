# GitHub-hosted runners cannot reach batdongsan.com.vn (blocked by the source site --
# see CLAUDE.md/docs/technical-guides.md), so CI never runs the real scrape or the
# Airflow DAGs -- that stays exclusively on the self-hosted local Airflow instance
# (docker-compose.yml, dags/). CI's job is fast feedback only: lint and a Docker
# build (+ publish to GHCR on merge to main). See dbt-ci.yml for the dbt-specific
# job, split out so it only runs when dbt/** actually changes.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
      - run: ruff check .

  docker-build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Builds on every push/PR to validate the Dockerfile; only pushes to GHCR
      # when merged to main (PRs just prove the image builds, nothing is published).
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
