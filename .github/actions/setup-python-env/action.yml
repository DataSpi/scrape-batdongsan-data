name: Setup Python Environment
description: >-
  Set up Python 3.12 and install project + dev dependencies.
  Caller must `actions/checkout` first -- a local composite action (uses: ./...)
  can only be resolved after the repo is already checked out on the runner.

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: pip install -r requirements.txt -r requirements-dev.txt
      shell: bash
