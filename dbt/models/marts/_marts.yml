version: 2

models:
  - name: mart_real_estate
    description: >
      Gold layer for reporting: one row per listing with location names resolved via
      the listing's project (see model SQL comment for why). Replaces the ad hoc, never
      migrated re_silver.v_apartment_analysis Postgres view (sql/scripts/apartment_analysis.sql).
    config:
      contract:
        enforced: true
    columns:
      - name: unique_id
        data_type: string
        data_tests:
          - not_null
          - unique
      - name: product_id
        data_type: string
      - name: title
        data_type: string
      - name: real_estate_type
        data_type: string
      - name: price_num
        data_type: float64
      - name: area_num
        data_type: float64
      - name: price_per_m2_recal
        data_type: float64
      - name: verified
        data_type: bool
      - name: vipType
        data_type: int64
      - name: date_scraped
        data_type: date
      - name: projectId
        data_type: int64
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_projects')
                field: projectId
              config:
                severity: warn
      - name: project_name
        data_type: string
      - name: district_name
        data_type: string
      - name: city_name
        data_type: string
      - name: lat_v1
        data_type: float64
      - name: lng_v1
        data_type: float64
      - name: ward_name_v2
        data_type: string
      - name: city_name_v2
        data_type: string
      - name: lat_v2
        data_type: float64
      - name: lng_v2
        data_type: float64
      - name: street_name
        data_type: string
