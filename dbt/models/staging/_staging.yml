version: 2

seeds:
  - name: real_estate_type_mapping
    description: >
      Lookup for normalizing the real_estate_type slug matched out of a listing's link
      into a canonical Vietnamese label. Ported from the `whitelist` + `type_mapping`
      dict in src/_br2sil/j_real_estate.py. Two whitelist entries (`ban-nha-rieng`,
      `ban-can-ho-chung-cu`) were intentionally dropped: in the legacy Python loop they
      were always shadowed by an earlier, broader substring match (`nha-rieng` /
      `can-ho-chung-cu` respectively) and could never actually be returned, so keeping
      them would just be dead rows.
    columns:
      - name: raw_token
        data_tests:
          - unique
          - not_null
      - name: real_estate_type
        data_tests:
          - not_null

  - name: district_geo_v1
    description: >
      Lat/lng for each legacy (v1) district, geocoded once via
      src/_geocode/geocode_locations.py (Google Geocoding API). Not refreshed on a
      schedule -- districts are static; re-run the script and `dbt seed` manually if
      new districts ever show up. lat/lng are blank (NULL after seed) when the API
      couldn't resolve an address.
    columns:
      - name: districtId
        data_tests:
          - unique
          - not_null

  - name: ward_geo_v2
    description: >
      Lat/lng for each active (v2) ward, geocoded once via
      src/_geocode/geocode_locations.py. Same caveats as district_geo_v1.
    columns:
      - name: wardId
        data_tests:
          - unique
          - not_null

models:
  - name: stg_real_estate
    description: >
      One row per listing (deduped by product_id, keeping the most recent scraped_at).
      Replaces src/_br2sil/j_real_estate.py, which appended every run's full re-read of
      re_bronze.real_estate to re_silver.real_estate with no real dedup — only a log
      line — so re_silver.real_estate has been accumulating duplicate rows on every run.
    columns:
      - name: product_id
        description: Native listing id from batdongsan.com.vn.
        data_tests:
          - not_null
          - unique
      - name: link
        data_tests:
          - not_null
      - name: is_price_outlier
        description: >
          True when price_1m2 is < 5 or > 1000 triệu/m2 -- outside every observed
          legitimate listing (cheapest real nhà ở xã hội listings run ~6.65+, priciest
          named-tower units top out around 930). Catches source-site data-entry errors,
          almost always a triệu/tỷ unit mixup (e.g. product_id 45698293, where a stray
          total-price typo produced a ~8,000 triệu/m2 price/m2). mart_real_estate
          filters these rows out; they stay visible here for manual review.

  - name: stg_real_estate_rent
    description: >
      Rental ("cho thuê") counterpart to stg_real_estate, built from its own bronze
      table (re_bronze.real_estate_rent) since rental prices are monthly rates, not
      comparable to sale prices. One row per listing (deduped by product_id, keeping
      the most recent scraped_at).
    columns:
      - name: product_id
        description: Native listing id from batdongsan.com.vn.
        data_tests:
          - not_null
          - unique
      - name: link
        data_tests:
          - not_null

  - name: stg_locations_v1
    description: Legacy (old-address) district+city join. Source tables are frozen.
    columns:
      - name: districtId
        data_tests:
          - unique
          - not_null

  - name: stg_locations_v2
    description: Active (post-address-reform) ward+city join.
    columns:
      - name: wardId
        data_tests:
          - unique
          - not_null

  - name: stg_projects
    description: Full outer join of legacy and active project reference tables.
    columns:
      - name: projectId
        data_tests:
          - unique
          - not_null
